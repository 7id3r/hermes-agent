services:
  gateway:
    build: .
    image: hermes-agent
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    volumes:
      - '~/.hermes:/opt/data'
    environment:
      - 'HERMES_UID=${HERMES_UID:-1000}'
      - 'HERMES_GID=${HERMES_GID:-1000}'
    command:
      - gateway
      - run
  dashboard:
    image: hermes-agent
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - '~/.hermes:/opt/data'
    environment:
      - 'HERMES_UID=${HERMES_UID:-1000}'
      - 'HERMES_GID=${HERMES_GID:-1000}'
    command:
      - dashboard
      - '--host'
      - 0.0.0.0
      - '--insecure'
      - '--no-open'
